name: YKS Sonuclari Kontrol Et

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  kontrol_isleri:
    runs-on: ubuntu-latest
    
    steps:
      - name: Depoyu Kopyala
        uses: actions/checkout@v4   # ← Bunu güncelledim

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri Yükle ve Çalıştır
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 twilio
          python -u yks.py
