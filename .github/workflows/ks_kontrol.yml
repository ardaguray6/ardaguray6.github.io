name: YKS Sonuclari Kontrol Et

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  kontrol_isleri:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Kopyala
      # actions/checkout@v3 yerine onun tam SHA kodunu yazdık
      uses: actions/checkout@ac593985615ec2ede58e132d2e21d2b1cbd6127c

    - name: Python Kur
      # actions/setup-python@v4 yerine onun tam SHA kodunu yazdık
      uses: actions/setup-python@d27e3f3d7c64b4bbf85c13d9b353d10912340deb
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        pip install requests beautifulsoup4 twilio

    - name: Kontrol Kodunu Çalıştır
      run: python yks.py
