name: YKS Sonuclari Kontrol Et

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  kontrol_isleri:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Kopyala
      # actions/checkout@v3'ün tam uzunluktaki (40 karakter) SHA kodu:
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

    - name: Python Kur
      # actions/setup-python@v4'ün tam uzunluktaki (40 karakter) SHA kodu:
      uses: actions/setup-python@d90514395375797e31edbd07e86e082f42b36b4d
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        pip install requests beautifulsoup4 twilio

    - name: Kontrol Kodunu Çalıştır
      run: python yks.py
