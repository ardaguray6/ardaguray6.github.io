name: YKS Sonuclari Kontrol Et

on:
  schedule:
    # Her 5 saatte bir yeni nöbetçi makineyi başlatır
    - cron: '0 */5 * * *'
  workflow_dispatch: # İstediğimiz zaman elle başlatabilmek için

jobs:
  kontrol_isleri:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        pip install requests beautifulsoup4 twilio

    - name: Kontrol Kodunu Çalıştır
      run: python yks.py